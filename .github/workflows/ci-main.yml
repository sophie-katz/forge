name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'forge-compiler/**'
  workflow_dispatch:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Run CI
        uses: ./.github/actions/ci.yml

