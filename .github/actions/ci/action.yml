name: Build and Test C Project

runs: 
  using: composite
  steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build Core
      working-directory: forge-core
      shell: bash
      run: |
        git config --global --add safe.directory $(realpath ..)
        meson setup build || cat build/meson-logs/meson-log.txt
        meson compile -C build

    - name: Run tests
      working-directory: forge-core
      shell: bash
      run: |
        meson test -C build
